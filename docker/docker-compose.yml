version: "3.9"
services:
  matchbox:
    image: "jhelsing/matchbox-server:0.6"
    ports:
      - "3536:3536"
    networks:
      - bugchess_network
  coturn:
    image: "coturn/coturn"
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf
    networks:
      - bugchess_network
  game-server:
    image: "neidhart/bugchess-server"
    volumes:
      - ./error_reports/:/error_reports
    networks:
      - bugchess_network

networks:
  bugchess_network:
    name: bugchess_network
    external: true

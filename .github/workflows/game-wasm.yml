name: Game Wasm

on:
  push:
    branches: [ master ]
    paths-ignore:
      - ".github/workflows/game-infrastructure.yml"
      - "game-server/**"
      - "docker/**"
      - "**.txt"
      - "**.md"


env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: bugchess
  BUILD_PROFILE: ci-wasm

jobs:
  quality:
    runs-on: ubuntu-latest
    environment: heartlabs.tech
    steps:
    - uses: actions/checkout@v4
    - name: Install prerequisites
      run: sudo apt-get update --fix-missing && sudo apt-get -y install libasound2-dev libgl1-mesa-dev xorg-dev binaryen wabt
    - name: Setup Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        components: clippy
    - name: Setup nightly rustfmt
      run: rustup toolchain install nightly --component rustfmt --profile minimal
    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
    - name: Format check
      run: cargo +nightly fmt --check
    - name: Clippy
      run: cargo clippy --workspace -- -D warnings
    - name: Test
      run: cargo test --workspace

  wasm-build:
    runs-on: ubuntu-latest
    environment: heartlabs.tech
    steps:
    - uses: actions/checkout@v4
    - name: Install prerequisites
      run: sudo apt-get update --fix-missing && sudo apt-get -y install binaryen
    - name: Setup Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
    - name: Resolve wasm-bindgen version
      id: wasm_bindgen_version
      run: |
        WASM_BINDGEN_VERSION=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | cut -d'"' -f2)
        echo "version=$WASM_BINDGEN_VERSION" >> "$GITHUB_OUTPUT"
        echo "wasm-bindgen version from Cargo.lock: $WASM_BINDGEN_VERSION"
    - name: Cache wasm-bindgen-cli
      id: wasm_bindgen_cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/wasm-bindgen
          ~/.cargo/.crates2.json
          ~/.cargo/.crates.toml
        key: ${{ runner.os }}-wasm-bindgen-cli-${{ steps.wasm_bindgen_version.outputs.version }}
    - name: Setup wasm-bindgen
      if: steps.wasm_bindgen_cache.outputs.cache-hit != 'true'
      run: cargo install -f wasm-bindgen-cli --version "${{ steps.wasm_bindgen_version.outputs.version }}"
    - name: Build
      run: chmod a+x ./build.sh && BUILD_PROFILE=${{ env.BUILD_PROFILE }} ./build.sh
    - name: Compress
      run: >
        cd target/wasm32-unknown-unknown/${{ env.BUILD_PROFILE }}/
        && wasm-opt -Os -o ${{ env.PROJECT_NAME }}-opt.wasm ${{ env.PROJECT_NAME }}.wasm
##       enable for even smaller sizes:
##        && wasm-strip ${{ env.PROJECT_NAME }}-opt.wasm
##       && wasm-opt -Os --dce -o ${{ env.PROJECT_NAME }}-opt.wasm ${{ env.PROJECT_NAME }}-opt.wasm
    - name: Prepare Release
      run: zip -r ${{ env.PROJECT_NAME }}_wasm.zip html
    - name: Upload wasm package
      uses: actions/upload-artifact@v4
      with:
        name: wasm-package
        path: ${{ env.PROJECT_NAME }}_wasm.zip

  release-deploy:
    runs-on: ubuntu-latest
    environment: heartlabs.tech
    needs: [quality, wasm-build]
    steps:
    - uses: actions/checkout@v4
    - name: Download wasm package
      uses: actions/download-artifact@v4
      with:
        name: wasm-package
    - name: Extract package
      run: unzip -o ${{ env.PROJECT_NAME }}_wasm.zip
    - name: Bump version and push tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.PROJECT_NAME }}_wasm.zip
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
    - name: copy static files via ssh
      uses: appleboy/scp-action@master
      with:
        host: v2202204174441188151.happysrv.de
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_USER_PASSWORD }}
        source: "html/*"
        target: "/home/server/bugchess/html"
        strip_components: 1
    
    
